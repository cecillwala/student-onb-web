<form [formGroup]="form">

  <!-- ======== Residence Type ======== -->
  <section class="form-section">
    <h3 class="section-title">Residence Preference</h3>
    <div class="form-grid cols-2">

      <!-- Resident Status -->
      <div class="form-group">
        <label class="form-label">Residence Type <span class="required">*</span></label>
        <app-dropdown-select
          formControlName="residenceType"
          [data]="residenceTypes"
          displayField="name"
          valueField="name"
          placeholder="Select residence type"
          searchPlaceholder="Search..."
        ></app-dropdown-select>
      </div>

      <!-- ── Resident fields ── -->
      @if (isResident) {

        <div class="form-group">
          <label class="form-label">Hostel Preference</label>
          <app-dropdown-select
            formControlName="hostelPreference"
            [data]="hostelOptions()"
            (selectionChange)="onHostelChange($event)"
            displayField="name" valueField="id"
            placeholder="Select hostel"
          ></app-dropdown-select>
        </div>

        <div class="form-group">
          <label class="form-label">Room Type</label>
          <app-dropdown-select
            formControlName="roomType"
            [data]="roomTypeOptions()"
            (selectionChange)="onRoomTypeChange($event)"
            displayField="name" valueField="id"
            placeholder="Select room type"
          ></app-dropdown-select>
        </div>

        <div class="form-group">
          <label class="form-label">Floor</label>
          <app-dropdown-select
            formControlName="floor"
            [data]="floorOptions()"
            (selectionChange)="onFloorChange($event)"
            displayField="name" valueField="id"
            placeholder="Select floor"
          ></app-dropdown-select>
        </div>

        <div class="form-group">
          <label class="form-label">Room No.</label>
          <app-dropdown-select
            formControlName="room"
            [data]="roomOptions()"
            (selectionChange)="onRoomChange($event)"
            displayField="name" valueField="id"
            placeholder="Select room"
          ></app-dropdown-select>
        </div>
      }

      <!-- ── Non-resident fields ── -->
      @if (!isResident) {

        <!-- Reason -->
        <div class="form-group">
          <label class="form-label">Reason for Living Off Campus <span class="required">*</span></label>
          <app-dropdown-select
            formControlName="offCampusReason"
            [data]="offCampusReasons"
            displayField="name"
            valueField="name"
            placeholder="Select reason"
            searchPlaceholder="Search reason..."
          ></app-dropdown-select>
        </div>

        <!-- Guardian Awareness -->
        <div class="form-group">
          <label class="form-label">Are your parents/guardian aware? <span class="required">*</span></label>
          <div class="radio-group">
            <label
              class="radio-card"
              [class.selected]="form.get('guardianAware')?.value === true"
              (click)="form.get('guardianAware')?.setValue(true)"
            >
              <span class="radio-dot" [class.active]="form.get('guardianAware')?.value === true"></span>
              Yes, they are aware
            </label>
            <label
              class="radio-card"
              [class.selected]="form.get('guardianAware')?.value === false"
              (click)="form.get('guardianAware')?.setValue(false)"
            >
              <span class="radio-dot" [class.active]="form.get('guardianAware')?.value === false"></span>
              No, they are not aware
            </label>
          </div>
        </div>

      }

    </div>
  </section>

  <!-- ======== Resident Special Needs ======== -->
  @if (isResident) {
    <section class="form-section">
      <h3 class="section-title">Special Accommodation Needs</h3>
      <div class="form-group">
        <label class="form-label">Special Needs</label>
        <mat-form-field appearance="outline" class="form-field full-width">
          <textarea
            matInput
            formControlName="specialNeeds"
            placeholder="Describe any special accommodation needs"
            rows="3"
          ></textarea>
        </mat-form-field>
      </div>
    </section>
  }

  <!-- ======== Off Campus Details ======== -->
  @if (!isResident) {

    <section class="form-section">
      <h3 class="section-title">Off Campus Location</h3>
      <div class="form-grid cols-2">

        <!-- Building Name -->
        <div class="form-group">
          <label class="form-label">Building Name <span class="required">*</span></label>
          <mat-form-field appearance="outline" class="form-field full-width">
            <input
              matInput
              formControlName="buildingName"
              placeholder="Enter building name"
            />
          </mat-form-field>
        </div>

        <!-- Location -->
        <div class="form-group">
          <label class="form-label">Location <span class="required">*</span></label>
          <app-dropdown-select
            formControlName="offCampusLocation"
            [data]="offCampusLocations"
            displayField="name"
            valueField="name"
            placeholder="Select location"
            searchPlaceholder="Search location..."
          ></app-dropdown-select>
        </div>

        <!-- Room Type -->
        <div class="form-group">
          <label class="form-label">Room Type <span class="required">*</span></label>
          <app-dropdown-select
            formControlName="offCampusRoomType"
            [data]="offCampusRoomTypes"
            displayField="name"
            valueField="name"
            placeholder="Select room type"
            searchPlaceholder="Search..."
            (selectionChange)="onOffCampusRoomTypeChange($event)"
          ></app-dropdown-select>
        </div>

      </div>
    </section>

    <!-- ======== Landlord Details ======== -->
    <section class="form-section">
      <h3 class="section-title">Landlord Details</h3>
      <div class="form-grid cols-2">

        <!-- First Name -->
        <div class="form-group">
          <label class="form-label">First Name <span class="required">*</span></label>
          <mat-form-field appearance="outline" class="form-field full-width">
            <input
              matInput
              formControlName="landlordFirstName"
              placeholder="Enter landlord's first name"
            />
          </mat-form-field>
        </div>

        <!-- Last Name -->
        <div class="form-group">
          <label class="form-label">Last Name <span class="required">*</span></label>
          <mat-form-field appearance="outline" class="form-field full-width">
            <input
              matInput
              formControlName="landlordLastName"
              placeholder="Enter landlord's last name"
            />
          </mat-form-field>
        </div>

        <!-- Phone -->
        <div class="form-group phone-field">
          <label class="form-label">Phone Number <span class="required">*</span></label>
          <ngx-material-intl-tel-input
          [preferredCountries]="['ke']"
          [mainLabel]="''"
          [enablePlaceholder]="true"
          [enableSearch]="true"
          fieldControlName="landlordPhone"
        ></ngx-material-intl-tel-input>
        </div>

      </div>
    </section>

    <!-- ======== Roommate Details ======== -->
    @if (isSharedRoom()) {
      <section class="form-section">
        <h3 class="section-title">Roommate Details</h3>
        <div class="form-grid cols-2">

          <!-- First Name -->
          <div class="form-group">
            <label class="form-label">First Name <span class="required">*</span></label>
            <mat-form-field appearance="outline" class="form-field full-width">
              <input
                matInput
                formControlName="roommateFirstName"
                placeholder="Enter roommate's first name"
              />
            </mat-form-field>
          </div>

          <!-- Last Name -->
          <div class="form-group">
            <label class="form-label">Last Name <span class="required">*</span></label>
            <mat-form-field appearance="outline" class="form-field full-width">
              <input
                matInput
                formControlName="roommateLastName"
                placeholder="Enter roommate's last name"
              />
            </mat-form-field>
          </div>

          <!-- Phone -->
          <div class="form-group phone-field">
            <label class="form-label">Phone Number</label>
            <ngx-material-intl-tel-input
              [preferredCountries]="['ke']"
              [mainLabel]="''"
              [enablePlaceholder]="true"
              [enableSearch]="true"
              fieldControlName="roommatePhone"
            ></ngx-material-intl-tel-input>
          </div>

        </div>
      </section>
    }

  }

</form>
