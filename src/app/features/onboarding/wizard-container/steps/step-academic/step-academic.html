<form [formGroup]="form">
  <section class="form-section">
    <h3 class="section-title">Academic Details</h3>
    <div class="form-grid cols-2">

      <!-- Mode of Study -->
      <div class="form-group">
        <label class="form-label">Mode of Study <span class="required">*</span></label>
        <app-dropdown-select
          formControlName="modeOfStudy"
          [data]="studyModes"
          displayField="name"
          valueField="name"
          placeholder="Select mode of study"
          searchPlaceholder="Search mode..."
        ></app-dropdown-select>
      </div>

      <!-- Extracurricular Interests -->
    <div class="form-group">
      <label class="form-label">Extracurricular Interests</label>
      <app-dropdown-select-multiple
        formControlName="extraCurricularActivities"
        [data]="extracurricularsList"
        displayField="name"
        valueField="name"
        placeholder="Select extracurricular activities"
        searchPlaceholder="Search activities..."
      ></app-dropdown-select-multiple>
    </div>

      <!-- Special Support Needs -->
      <div class="form-group">
        <label class="form-label">Special Support Needs</label>
        <mat-form-field appearance="outline" class="form-field full-width">
          <textarea
            matInput
            formControlName="specialSupportNeeds"
            placeholder="Describe your special support needs"
            rows="3"
          ></textarea>
        </mat-form-field>
      </div>

    </div>
  </section>
</form>
