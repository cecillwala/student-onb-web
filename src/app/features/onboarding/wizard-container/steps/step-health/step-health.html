<section class="form-section">
  <div class="form-grid cols-2">
    <div class="form-group">
      <label class="form-label">Blood Group <span class="required">*</span></label>
      <select class="form-select">
        <option value="">Select</option>
        <option *ngFor="let g of bloodGroups">{{ g }}</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Preferred Hospital</label>
      <input class="form-input" placeholder="Enter hospital name" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Medical Conditions</label>
    <textarea class="form-textarea" placeholder="List any medical conditions"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">Allergies</label>
    <textarea class="form-textarea" placeholder="List any allergies"></textarea>
  </div>
</section>

<section class="form-section">
  <h3 class="section-title">Insurance Details</h3>
  <div class="form-grid cols-2">
    <div class="form-group">
      <label class="form-label">Insurance Provider</label>
      <input class="form-input" placeholder="Enter provider name" />
    </div>
    <div class="form-group">
      <label class="form-label">Policy Number</label>
      <input class="form-input" placeholder="Enter policy number" />
    </div>
  </div>
</section>

<section class="form-section">
  <h3 class="section-title">Emergency Contact</h3>
  <div class="form-grid cols-2">
    <div class="form-group" *ngFor="let f of emergencyFields">
      <label class="form-label">{{ f.label }} <span class="required" *ngIf="f.required">*</span></label>
      <input class="form-input" [placeholder]="'Enter ' + f.label.toLowerCase()" />
    </div>
  </div>
</section>

<section class="form-section">
  <label class="form-label">Medical Report</label>
  <div class="drop-area">
    <span class="material-icons drop-icon">attach_file</span>
    <span class="drop-text">Click to upload or drag and drop</span>
    <span class="drop-hint">PDF or JPEG, max 5MB</span>
  </div>
</section>
