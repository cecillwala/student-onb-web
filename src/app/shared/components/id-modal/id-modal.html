<div class="selfie-modal">
  <!-- Header bar -->
  <div class="modal-header">
    <div class="header-left">
      <span class="material-icons header-icon">face</span>
      <div class="header-text">
        <h2>Capture National ID</h2>
      </div>
    </div>
    <button class="close-btn" mat-dialog-close>
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Hidden file input -->
  <input
    #fileInput
    type="file"
    class="file-input"
    (change)="onFileSelected($event)"
    accept=".jpeg, .jpg, .png, image/jpeg, image/png"
    style="display: none"
  />

  <!-- Camera area -->
  <div class="camera-area">
    <!-- Video feed -->
    <video
      #video
      [hidden]="capturedImage"
      autoplay
      playsinline
      class="camera-feed"
    ></video>

    <!-- Face guide overlay -->
    <div class="blur-overlay" [hidden]="capturedImage">
      <div class="guide-frame">
        <div class="face-guide-oval"></div>
      </div>
     `   -->
    </div>

    <!-- Preview canvas -->
    <canvas #canvas [hidden]="!capturedImage" class="preview-canvas"></canvas>

    <!-- Hidden canvas for frame capture -->
    <canvas #frameCanvas style="display: none"></canvas>

    <!-- Liveness check overlay -->
    @if (checkingLiveness) {
      <div class="liveness-overlay">
        <div class="liveness-content">
          <mat-spinner diameter="36" color="accent"></mat-spinner>
          <span class="liveness-label">Verifying identity...</span>
          <span class="liveness-sub">This will only take a moment</span>
        </div>
      </div>
    }

    <!-- Success badge -->
    @if (imageVerified && !checkingLiveness) {
      <div class="success-badge">
        <span class="material-icons">check_circle</span>
        Selfie verified
      </div>
    }
  </div>

  <!-- Bottom controls -->
  <div class="modal-controls">
    @if (!capturedImage) {
      <!-- Capture state -->
      <div class="capture-row">
        <button class="btn-upload-file" (click)="fileInput.click()">
          <span class="material-icons">photo_library</span>
          Upload
        </button>
        <button class="btn-capture" (click)="captureImage()">
          <span class="shutter-ring">
            <span class="shutter-inner"></span>
          </span>
        </button>
        <div class="btn-placeholder"></div>
      </div>
    } @else {
      <!-- Review state -->
      <div class="review-row">
        <button
          class="btn-retake"
          (click)="retake()"
          [disabled]="checkingLiveness"
        >
          <span class="material-icons">refresh</span>
          Retake
        </button>
        <button
          class="btn-confirm"
          (click)="saveImage()"
          [disabled]="checkingLiveness"
        >
          @if (checkingLiveness) {
            <mat-spinner diameter="18"></mat-spinner>
            Verifying...
          } @else {
            <span class="material-icons">check</span>
            Confirm
          }
        </button>
      </div>
    }
  </div>
</div>
