<div class="verification-container">
  <button class="close-button" mat-dialog-close>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <h2 mat-dialog-title>{{ 'MODALS.QR.TITLE' }}</h2>
  <!-- <p style="color: black">Or</p> -->
  <!-- <button class="directUpload" (click)="closeAndUpload()">
    Upload directly
  </button> -->
  <p class="description">
    {{
      'MODALS.QR.DESCRIPTION'
    }}
  </p>

  @if (!isLoading()) {
  <div>
    <!-- QR Code Display -->
    <canvas #qrCanvas style="margin-bottom: 10px"></canvas>
    <!-- Preview Section -->
    @if (scannedImage) {
    <div class="w-full">
      <img [src]="scannedImage" alt="Scanned Document" class="w-full rounded" />
    </div>
    }
  </div>

  <button class="directUpload" (click)="closeAndUpload()">
    {{ 'MODALS.QR.UPLOAD_DIRECT'}}
  </button>
  } @if (isLoading()) {
  <div>
    <div class="loading-container">
      <mat-spinner></mat-spinner>
    </div>
  </div>
  }
</div>
