<nav class="navbar">
  <div class="navbar-brand">
    <div class="logo-icon">EU</div>
    <div class="brand-text">
      <span class="brand-name">Egerton University</span>
      <span class="brand-subtitle">Student Onboarding Portal</span>
    </div>
  </div>

  <div class="navbar-right" *ngIf="showProfile">
    <button class="notification-btn" title="Notifications">
      <span class="material-icons">notifications_none</span>
    </button>
    <button class="notification-btn" (click)="themeService.toggle()">
      @if(themeService.isDark()){
          <span class="material-icons">dark_mode</span>
      }
      @else{
          <span class="material-icons">light_mode</span>
      }
      
    </button>
    <div class="profile-section">
      <div class="avatar">{{ initials }}</div>
      <span class="profile-name">{{ first_name }}</span>
    </div>
  </div>
</nav>
