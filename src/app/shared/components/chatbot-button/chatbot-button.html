<!-- Chat panel -->
<div class="chat-panel" *ngIf="isOpen">
  <div class="chat-header">
    <div>
      <div class="chat-title">Onboarding Assistant</div>
      <div class="chat-subtitle">Ask me anything about the process</div>
    </div>
    <button class="chat-close" (click)="toggle()">
      <span class="material-icons">close</span>
    </button>
  </div>

  <div class="chat-body" #chatBody>
    @for (msg of messages(); track msg.timestamp) {
      <div class="chat-bubble"
           [class.bot]="msg.role === 'assistant'"
           [class.user]="msg.role === 'user'">
        {{ msg.content }}
      </div>
    }

    @if (isLoading()) {
      <div class="chat-bubble bot typing">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    }
  </div>

  <!-- Quick suggestions (only show when no messages have been sent yet) -->
  @if (messages().length <= 1 && !isLoading()) {
    <div class="suggestions">
      @for (q of quickQuestions; track q) {
        <button class="suggestion-chip" (click)="askQuestion(q)">{{ q }}</button>
      }
    </div>
  }

  <div class="chat-input-area">
    <input
      type="text"
      class="chat-input"
      placeholder="Type your question..."
      [(ngModel)]="userInput"
      (keyup.enter)="sendMessage()"
      [disabled]="isLoading()"
    />
    <button class="chat-send"
            (click)="sendMessage()"
            [disabled]="isLoading() || !userInput.trim()">
      <span class="material-icons">arrow_upward</span>
    </button>
  </div>
</div>

<!-- Floating button -->
<button class="fab" (click)="toggle()">
  <span class="material-icons">{{ isOpen ? 'close' : 'chat' }}</span>
</button>
